name: lks-prod-pipeline

on:
  push:
    branches:
      - prod

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Images
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/lks-voting-image:vote-prod-latest ./vote
          docker push ${{ steps.login-ecr.outputs.registry }}/lks-voting-image:vote-prod-latest

          docker build -t ${{ steps.login-ecr.outputs.registry }}/lks-voting-image:result-prod-latest ./result
          docker push ${{ steps.login-ecr.outputs.registry }}/lks-voting-image:result-prod-latest

          docker build -t ${{ steps.login-ecr.outputs.registry }}/lks-voting-image:worker-prod-latest ./worker
          docker push ${{ steps.login-ecr.outputs.registry }}/lks-voting-image:worker-prod-latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Register new Task Definition and Deploy to ECS
        run: |
          aws ecs update-service             --cluster lks-voting-cluster             --service lks-vote-service             --force-new-deployment

          aws ecs update-service             --cluster lks-voting-cluster             --service lks-result-service             --force-new-deployment

          aws ecs update-service             --cluster lks-voting-cluster             --service lks-worker-service             --force-new-deployment

      - name: Notify via SNS
        run: |
          aws sns publish             --topic-arn ${{ secrets.AWS_SNS_ARN }}             --subject "Helo dari Jawa Barat!"             --message "Versi baru Aplikasi Pemungutan Suara dari Jawa Barat Dirilis !!"